<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Rübentimer Firebase+</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:#0f1117;
    --surface:#1a1d27;
    --card:#1e2130;
    --border:#2a2f45;
    --accent:#4ade80;
    --text:#e2e8f0;
    --muted:#64748b;
    --warn:#f59e0b;
    --danger:#ef4444;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:Inter;
    background:var(--bg);
    color:var(--text);
  }

  header{
    background:var(--surface);
    padding:14px;
    display:flex;
    gap:10px;
    align-items:center;
    position:sticky;
    top:0;
    z-index:10;
    flex-wrap:wrap;
  }

  input,select{
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:7px;
    border-radius:8px;
  }

  button{
    padding:7px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
  }

  .btn{background:var(--accent);color:#000}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:12px;
    padding:15px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
  }

  .mut-line{
    font-size:12px;
    color:var(--muted);
  }

  .price{
    color:var(--warn);
    font-weight:700;
    margin-top:6px;
  }

  .modal{
    position:fixed;
    inset:0;
    background:#0009;
    display:none;
    align-items:center;
    justify-content:center;
  }

  .modal-content{
    background:var(--card);
    padding:16px;
    border-radius:12px;
    width:300px;
  }
</style>
</head>

<body>

<header>
  <input id="name" placeholder="Beetname">
  <input id="market" type="number" value="100000">
  <button class="btn" onclick="addBeet()">+ Beet</button>
</header>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Mutationen</h3>

    <label><input type="checkbox" id="gold"> Gold (10x)</label><br><br>

    <select id="shape">
      <option value="">Normal</option>
      <option value="stachelig">Stachelig +50k</option>
      <option value="quadratisch">Quadratisch +100k</option>
      <option value="explosiv">Explosiv +500k</option>
      <option value="lebendig">Lebendig +1M</option>
    </select><br><br>

    <input id="weight" type="number" min="1" max="5" step="0.1" value="1"><br><br>

    <button onclick="saveMut()">Speichern</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot,
  doc, setDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"ruebentimer.firebaseapp.com",
  projectId:"ruebentimer"
});

const db = getFirestore(app);
const col = collection(db,"beete");

let beete = {};
let active = null;

/* ---------------- PRICE LOGIC ---------------- */

const SHAPES = {
  stachelig:50000,
  quadratisch:100000,
  explosiv:500000,
  lebendig:1000000
};

function calcPrice(b){
  let base = parseInt(document.getElementById("market").value)||100000;
  let m = b.mutations||{};

  let price = base;

  if(m.shape) price += SHAPES[m.shape]||0;
  if(m.weight) price *= m.weight;
  if(m.gold) price *= 10;

  return Math.round(price);
}

/* ---------------- FIREBASE ---------------- */

onSnapshot(col,(snap)=>{
  beete = {};
  snap.forEach(d=>{
    beete[d.id]=d.data();
  });
  render();
});

/* ---------------- UI ---------------- */

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  Object.entries(beete).forEach(([id,b])=>{
    const price = calcPrice(b);
    const m = b.mutations||{};

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${b.name}</b><br>
      <div class="mut-line">
        ⭐ ${m.gold?"Gold ":""} 
        🔷 ${m.shape||"Normal"} 
        ⚖️ ${m.weight||1}x
      </div>

      <div class="price">
        💰 ${price.toLocaleString()} 🪙
      </div>

      <br>

      <button onclick="openMut('${id}')">Mutationen</button>
      <button onclick="del('${id}')">Delete</button>
    `;

    grid.appendChild(div);
  });
}

/* ---------------- ACTIONS ---------------- */

window.addBeet=async()=>{
  const name=document.getElementById("name").value||"Beet";
  const id="b"+Date.now();

  await setDoc(doc(db,"beete",id),{
    name,
    mutations:{gold:false,shape:"",weight:1}
  });
};

window.del=async(id)=>{
  await deleteDoc(doc(db,"beete",id));
};

window.openMut=(id)=>{
  active=id;
  const b=beete[id]||{};
  const m=b.mutations||{};

  document.getElementById("gold").checked=m.gold||false;
  document.getElementById("shape").value=m.shape||"";
  document.getElementById("weight").value=m.weight||1;

  document.getElementById("modal").style.display="flex";
};

window.saveMut=async()=>{
  if(!active)return;

  await updateDoc(doc(db,"beete",active),{
    mutations:{
      gold:document.getElementById("gold").checked,
      shape:document.getElementById("shape").value,
      weight:parseFloat(document.getElementById("weight").value)||1
    }
  });

  document.getElementById("modal").style.display="none";
};

</script>

</body>
</html>
