<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>🟫 Rübentimer</title>
<style>
  :root { --bg: #0f1117; --accent: #22c55e; --text: #e2e8f0; --border: #1e2230; }
  body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
  .card { background: #1a1d27; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
  input { background: #0f1117; border: 1px solid var(--border); color: white; padding: 5px; border-radius: 4px; }
  button { cursor: pointer; background: var(--accent); border: none; padding: 8px 12px; border-radius: 6px; color: #0f1117; font-weight: bold; }
</style>
</head>
<body>

<div style="margin-bottom: 20px;">
  <input type="text" id="newName" placeholder="Beetname...">
  <button id="btnAdd">Beet hinzufügen</button>
</div>

<div class="grid" id="grid"></div>

<script>
let beete = JSON.parse(localStorage.getItem('rueben_data') || '{}');

function save() { localStorage.setItem('rueben_data', JSON.stringify(beete)); render(); }

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  Object.keys(beete).forEach(id => {
    const b = beete[id];
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${b.name}</h3>
      <p>Basispreis: <input type="number" value="${b.basePrice || 100}" onchange="updatePrice('${id}', this.value)"></p>
      <p>Marktwert: <b>${Math.round(b.basePrice || 100)} 🪙</b></p>
      <button onclick="del('${id}')">Löschen</button>
    `;
    grid.appendChild(card);
  });
}

function updatePrice(id, val) {
  beete[id].basePrice = parseInt(val) || 0;
  save();
}

function del(id) { delete beete[id]; save(); }

document.getElementById('btnAdd').addEventListener('click', () => {
  const name = document.getElementById('newName').value.trim();
  if(!name) return;
  const id = 'b_' + Date.now();
  beete[id] = { name, basePrice: 100 };
  document.getElementById('newName').value = '';
  save();
});

render();
</script>
</body>
</html>
