<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟫 Rübentimer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #0b0e14; --border: #1e2230;
    --accent: #22c55e; --text: #e2e8f0; --muted: #94a3b8; --ripe: #22c55e;
    --water: #38bdf8; --warning: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: rgba(26, 29, 39, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.3rem; font-weight: 700; }
  .header-controls { display: flex; align-items: center; gap: 8px; flex: 1; }
  input[type="text"], input[type="number"], select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 0.85rem; outline: none; }
  button { cursor: pointer; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; padding: 7px 14px; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #0f1117; }

  main { padding: 16px 20px; max-width: 1600px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: rgba(11, 14, 20, 0.88); border: 1px solid var(--border); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  
  .card-header { display: flex; align-items: baseline; justify-content: space-between; }
  .card-title { font-size: 1.1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .turnip-img-box { width: 58px; height: 58px; background: #151922; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; position: relative; border: 1px solid #1e2433; }
  .multiplier { position: absolute; top: -4px; left: -4px; background: #f59e0b; color: #0f1117; font-size: 0.6rem; font-weight: 800; border-radius: 50%; padding: 2px 5px; }
  
  .stats { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; }
  .progress-bar { width: 100%; height: 5px; background: #151922; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; border-radius: 4px; }
  
  .timer-btns { display: flex; gap: 6px; }
  .timer-btn { flex: 1; padding: 8px 4px; font-weight: 700; border-radius: 8px; color: #fff; text-align: center; cursor: pointer; }
  .card-actions { display: flex; gap: 6px; }
  .action-btn { padding: 8px 4px; background: #1f2431; color: #fff; font-size: 0.85rem; border-radius: 8px; flex: 1; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: #1a1d27; border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 340px; }
  .mutation-option { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
</style>
</head>
<body>

<header>
  <div class="logo">🟫 Rübentimer</div>
  <div class="header-controls">
    <input type="text" id="newName" placeholder="Beetname..." />
    <button class="btn-primary" id="btnAddBeet">+ Hinzufügen</button>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<div class="modal-overlay" id="mutModal" style="display:none">
  <div class="modal">
    <h3>🧬 <span id="mutModalTitle"></span></h3>
    <div class="mutation-option">
      <span>💰 Basispreis (🪙):</span>
      <input type="number" id="mut-base-price" min="0" step="10">
    </div>
    <div class="mutation-option">
      <label><input type="checkbox" id="mut-gold"> ⭐ Goldene Rübe (10x)</label>
    </div>
    <div class="mutation-option">
      <span>🔷 Form-Mutation:</span>
      <select id="mut-shape-select">
        <option value="">Normalform (+0)</option>
        <option value="stachelig">Stachelig (+50.000)</option>
        <option value="quadratisch">Quadratisch (+100.000)</option>
        <option value="explosiv">Explosiv (+500.000)</option>
        <option value="lebendig">Lebendig (+1.000.000)</option>
      </select>
    </div>
    <div class="mutation-option">
      <span>⚖️ Gewichts-Multiplikator:</span>
      <input type="number" id="mut-weight-mult" min="1" max="5" step="0.1">
    </div>
    <button class="btn-primary" style="width:100%" id="btnCloseModal">Speichern & Schließen</button>
  </div>
</div>

<script>
let beete = JSON.parse(localStorage.getItem('rueben_beete_v4')) || {};
let activeMutId = null;

const SHAPE_BONI = { stachelig: 50000, quadratisch: 100000, explosiv: 500000, lebendig: 1000000 };

function saveToStorage() { localStorage.setItem('rueben_beete_v4', JSON.stringify(beete)); }

function renderCard(b) {
  let card = document.getElementById('card-' + b.id) || document.createElement('div');
  card.id = 'card-' + b.id;
  card.className = 'card';
  
  const mut = b.mutations || {};
  const base = b.basePrice || 100;
  let price = (base + (SHAPE_BONI[mut.shapeKey] || 0)) * (parseFloat(mut.weightMult) || 1);
  if (mut.gold) price *= 10;

  card.innerHTML = `
    <div class="card-header"><span class="card-title">${b.name}</span></div>
    <div class="card-body-layout" style="display:flex; gap:12px;">
      <div class="turnip-img-box btn-trigger-mut">${mut.gold ? '👑' : '🥬'}</div>
      <div class="stats">
        <div class="stat-row"><span>Marktwert:</span><strong>${Math.round(price).toLocaleString()} 🪙</strong></div>
        <div class="stat-row" style="color:var(--muted); font-size:0.7rem;">Basis: ${base} | Mult: ${mut.weightMult || 1}x</div>
      </div>
    </div>
    <div class="timer-btns">
      <button class="timer-btn" style="background:#16a34a" onclick="addTime('${b.id}', 'water', 12)">💧 12h</button>
      <button class="timer-btn" style="background:#dc2626" onclick="deleteBeet('${b.id}')">Löschen</button>
    </div>
  `;
  card.querySelector('.btn-trigger-mut').onclick = () => openMutModal(b.id);
  if (!document.getElementById(card.id)) document.getElementById('grid').appendChild(card);
}

function openMutModal(id) {
  activeMutId = id;
  const b = beete[id];
  document.getElementById('mutModalTitle').textContent = b.name;
  document.getElementById('mut-base-price').value = b.basePrice || 100;
  document.getElementById('mut-gold').checked = !!b.mutations.gold;
  document.getElementById('mut-shape-select').value = b.mutations.shapeKey || "";
  document.getElementById('mut-weight-mult').value = b.mutations.weightMult || 1;
  document.getElementById('mutModal').style.display = 'flex';
}

function closeAndSave() {
  const b = beete[activeMutId];
  b.basePrice = parseInt(document.getElementById('mut-base-price').value) || 100;
  b.mutations = {
    gold: document.getElementById('mut-gold').checked,
    shapeKey: document.getElementById('mut-shape-select').value,
    weightMult: parseFloat(document.getElementById('mut-weight-mult').value) || 1
  };
  saveToStorage();
  renderCard(b);
  document.getElementById('mutModal').style.display = 'none';
}

function addBeet() {
  const name = document.getElementById('newName').value || "Rübe";
  const id = 'b_' + Date.now();
  beete[id] = { id, name, basePrice: 100, mutations: { gold: false, shapeKey: "", weightMult: 1 } };
  saveToStorage();
  renderCard(beete[id]);
}

function addTime(id, type, h) { /* ...Logik bleibt wie gehabt... */ renderCard(beete[id]); }
function deleteBeet(id) { delete beete[id]; saveToStorage(); document.getElementById('card-'+id).remove(); }

document.getElementById('btnAddBeet').onclick = addBeet;
document.getElementById('btnCloseModal').onclick = closeAndSave;
Object.values(beete).forEach(renderCard);
</script>
</body>
</html>
