<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟫 Rübentimer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #0b0e14;
    --border: #1e2230;
    --accent: #22c55e;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --ripe: #22c55e;
    --water: #38bdf8;
    --warning: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    bottom: 0;
    right: 5%;
    width: 500px;
    height: 650px;
    background-image: url('./image_811360.jpg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: bottom right;
    mix-blend-mode: luminosity;
    opacity: 0.07;
    pointer-events: none;
    z-index: -1;
  }

  header {
    background: rgba(26, 29, 39, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    flex-wrap: wrap;
  }

  input[type="text"], input[type="number"], select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"] { width: 180px; }
  input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 7px 14px;
    transition: all 0.15s;
  }
  button:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: #16a34a; }

  .sync-status {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .sync-status.connected { color: var(--accent); }
  .sync-status.error { color: var(--warning); }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .sync-status.connected .sync-dot {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  .sync-status.error .sync-dot {
    background: var(--warning);
    box-shadow: 0 0 6px var(--warning);
  }

  main {
    padding: 16px 20px;
    max-width: 1600px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .hint { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  .card {
    background: rgba(11, 14, 20, 0.88);
    backdrop-filter: blur(4px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
  }

  .card-header { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; }
  .card-title { font-size: 1.1rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .status-text { font-size: 0.8rem; font-weight: 500; color: var(--muted); }
  .card-body-layout { display: flex; align-items: center; gap: 12px; width: 100%; }
  .card-left-cell { flex-shrink: 0; }
  .card-right-cell { flex-grow: 1; }

  .turnip-img-box {
    width: 58px; height: 58px;
    background: #151922;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; cursor: pointer; user-select: none;
    position: relative; border: 1px solid #1e2433;
  }

  .multiplier {
    position: absolute;
    top: -4px; left: -4px;
    background: #f59e0b; color: #0f1117;
    font-size: 0.6rem; font-weight: 800;
    border-radius: 50%; width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  .stats { display: flex; flex-direction: column; gap: 4px; width: 100%; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; }
  .stat-label { color: #fff; }
  .stat-value { font-weight: 700; color: #fff; }
  .stat-value.active-timer { color: #38bdf8; }
  .stat-value.warning { color: var(--warning); }

  .progress-bar { width: 100%; height: 5px; background: #151922; border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; border-radius: 4px; width: 0%; }
  .progress-fill.ripe { background: var(--ripe); }
  .progress-fill.water { background: var(--water); }
  .progress-fill.rot { background: var(--warning); }

  .timer-btns { display: flex; gap: 6px; }
  .timer-btn { flex: 1; padding: 8px 4px; font-size: 0.85rem; font-weight: 700; border-radius: 8px; color: #fff; text-align: center; cursor: pointer; }
  .tbtn-water { background: #16a34a; }
  .tbtn-water:hover { background: #15803d; }
  .tbtn-rot { background: #d97706; }
  .tbtn-rot:hover { background: #b45309; }
  .tbtn-neg { background: #7c3aed; }
  .tbtn-neg:hover { background: #6d28d9; }

  .card-actions { display: flex; gap: 6px; }
  .action-btn { padding: 10px 4px; background: #1f2431; color: #fff; font-size: 0.85rem; font-weight: 600; border-radius: 8px; text-align: center; flex: 1; cursor: pointer; }
  .action-btn:hover { background: #2d3446; }
  .btn-action-delete { flex: 1.3; background: #dc2626; color: white; }
  .btn-action-delete:hover { background: #b91c1c; }

  /* Mutation Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; }
  .modal { background: #1a1d27; border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 340px; max-width: 95vw; }
  .modal h3 { font-size: 1rem; margin-bottom: 16px; color: #fff; }
  .mutation-options { display: flex; flex-direction: column; gap: 12px; }
  .mutation-option { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 8px; border: 1px solid var(--border); color: #fff; }
  .mutation-option-col { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .modal-btns { margin-top: 16px; display: flex; justify-content: flex-end; }
  .btn-close-modal { background: #2a2f45; color: #fff; cursor: pointer; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <div class="logo">🟫 Rübentimer</div>
  <div class="header-controls">
   <input type="text" id="newName" placeholder="Beetname eingeben..." />
   <input
     type="number"
     id="marketPrice"
     placeholder="Marktpreis"
     value="100000"
     min="0"
     style="width:140px;"
   />
   <button class="btn-primary" id="btnAddBeet">+ Beet hinzufügen</button>
  </div>
  <div class="sync-status" id="syncStatus">
    <div class="sync-dot"></div>
    <span id="syncLabel">Verbinde…</span>
  </div>
</header>

<main>
  <p class="hint">Auf das Icon klicken = Mutationen öffnen und Marktwerte berechnen. Alle Änderungen werden live mit allen geteilt.</p>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="emoji">🌱</div>
    <p>Noch keine Beete. Füge dein erstes Beet hinzu!</p>
  </div>
</main>

<div class="modal-overlay" id="mutModal" style="display:none">
  <div class="modal">
    <h3>🧬 Mutationen — <span id="mutModalTitle"></span></h3>
    <div class="mutation-options">
      <label class="mutation-option" style="cursor: pointer;">
        <span style="display: flex; align-items: center; gap: 8px;">⭐ Goldene Rübe <small style="color:var(--muted)">(10x Gesamtpreis)</small></span>
        <input type="checkbox" id="mut-gold" style="width:18px; height:18px; accent-color:var(--accent);">
      </label>

      <div class="mutation-option mutation-option-col">
        <span>🔷 Form-Mutation:</span>
        <select id="mut-shape-select" style="width: 100%; padding: 6px;">
          <option value="">Normalform (+0)</option>
          <option value="stachelig">Stachelig (+50.000 🪙)</option>
          <option value="quadratisch">Quadratisch (+100.000 🪙)</option>
          <option value="explosiv">Explosiv (+500.000 🪙)</option>
          <option value="lebendig">Lebendig (+1.000.000 🪙)</option>
        </select>
      </div>

      <div class="mutation-option mutation-option-col">
        <span>⚖️ Gewichts-Multiplikator:</span>
        <div style="display: flex; align-items: center; gap: 8px; width: 100%;">
          <input type="number" id="mut-weight-mult" min="1" max="5" step="0.1" value="1" style="width: 80px;">
          <span style="font-size: 0.85rem; color: var(--muted);">x (Maximal 5-fach)</span>
        </div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-close-modal" id="btnCloseModal">Schließen</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6dxEUrQsk3FAIHDGA0rObqwXSYE3jt1w",
  authDomain: "ruebentimer.firebaseapp.com",
  projectId: "ruebentimer",
  storageBucket: "ruebentimer.firebasestorage.app",
  messagingSenderId: "193161065289",
  appId: "1:193161065289:web:1ec75431795e1c3596a098",
  measurementId: "G-51F6VB9VP8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "beete");
const settingsRef = doc(db, "settings", "global");

let beete = {};
let activeMutId = null;
let globalMarketPrice = 100000;

const GROW_INTERVAL  = 48 * 60 * 60 * 1000;
const WATER_INTERVAL = 12 * 60 * 60 * 1000;
const ROT_INTERVAL   = 4 * 24 * 60 * 60 * 1000;

// Form-Boni Definitionen
const SHAPE_BONI = {
  stachelig: { name: 'Stachelig', bonus: 50000 },
  quadratisch: { name: 'Quadratisch', bonus: 100000 },
  explosiv: { name: 'Explosiv', bonus: 500000 },
  lebendig: { name: 'Lebendig', bonus: 1000000 }
};

const grid = document.getElementById('grid');
const syncStatus = document.getElementById('syncStatus');
const syncLabel = document.getElementById('syncLabel');
const marketPriceInput = document.getElementById('marketPrice');

function now() { return Date.now(); }

function fmtTime(ms) {
  if (ms <= 0) return '0s';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function renderCard(b) {
  let card = document.getElementById('card-' + b.id);
  const isNew = !card;
  if (isNew) {
    card = document.createElement('div');
    card.id = 'card-' + b.id;
    card.className = 'card';
  }

  const planted = b.plantedAt || now();
  const lastWatered = b.wateredAt || planted;

  const ripeLeft  = Math.max(0, (planted + GROW_INTERVAL) - now());
  const isRipe    = ripeLeft <= 0;

  const waterLeft = Math.max(0, (lastWatered + WATER_INTERVAL) - now());
  const isWatered = waterLeft > 0;

  const waterEmptyAt = lastWatered + WATER_INTERVAL;
  let rotLeft = ROT_INTERVAL;
  let isRotten = false;

  if (!isWatered) {
    rotLeft = Math.max(0, (waterEmptyAt + ROT_INTERVAL) - now());
    if (rotLeft <= 0) isRotten = true;
  }

  const ripePct  = Math.min(100, ((now() - planted) / GROW_INTERVAL) * 100);
  const waterPct = Math.min(100, (waterLeft / WATER_INTERVAL) * 100);
  const rotPct   = isWatered ? 0 : Math.min(100, ((now() - waterEmptyAt) / ROT_INTERVAL) * 100);

  let statusStr = isRipe ? 'reif' : 'wächst';
  statusStr += isRotten ? ' + verdorrt' : (isWatered ? ' + bewässert' : ' + trocken');

  // --- PREISBERECHNUNG START ---
  const basePrice = globalMarketPrice;
  let calculatedPrice = basePrice;
  const mut = b.mutations || {};

  // 1. Form-Bonus addieren
  let shapeName = '';
  if (mut.shapeKey && SHAPE_BONI[mut.shapeKey]) {
    calculatedPrice += SHAPE_BONI[mut.shapeKey].bonus;
    shapeName = SHAPE_BONI[mut.shapeKey].name;
  }

  // 2. Gewichts-Multiplikator anwenden
  const weightMult = parseFloat(mut.weightMult) || 1;
  if (weightMult > 1) {
    calculatedPrice *= weightMult;
  }

  // 3. Gold-Multiplikator anwenden (Mal 10)
  if (mut.gold) {
    calculatedPrice *= 10;
  }
  // --- PREISBERECHNUNG ENDE ---

  // Mutationstext für die UI zusammenbauen
  let mutStr = 'Keine';
  const activeMuts = [];
  if (mut.gold) activeMuts.push('⭐ Gold');
  if (shapeName) activeMuts.push(`🔷 ${shapeName}`);
  if (weightMult > 1) activeMuts.push(`⚖️ Gewicht (${weightMult}x)`);
  if (activeMuts.length) mutStr = activeMuts.join(', ');

  // Gesamt-Anzeige-Multiplikator links auf dem Icon
  let displayMulti = 1;
  if (mut.gold) displayMulti *= 10;
  if (weightMult > 1) displayMulti *= weightMult;
  let multiBadgeHtml = displayMulti > 1 ? `<div class="multiplier" style="width:auto; padding:0 4px; border-radius:9px;">${displayMulti.toFixed(1)}x</div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <span class="card-title" title="${b.name}">${b.name}</span>
      <span class="status-text">${statusStr}</span>
    </div>

    <div class="card-body-layout">
      <div class="card-left-cell">
        <div class="turnip-img-box btn-trigger-mut">
          ${multiBadgeHtml}
          ${mut.gold ? '👑' : '🥬'}
        </div>
      </div>
      <div class="card-right-cell">
        <div class="stats">
          <div class="stat-row">
            <span class="stat-label">Bis reif</span>
            <span class="stat-value">${isRipe ? 'REIF' : fmtTime(ripeLeft)}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill ripe" style="width:${ripePct}%"></div></div>

          <div class="stat-row">
            <span class="stat-label">Wasser</span>
            <span class="stat-value ${isWatered ? 'active-timer' : 'warning'}">${isWatered ? fmtTime(waterLeft) : '0s'}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill water" style="width:${waterPct}%"></div></div>

          <div class="stat-row">
            <span class="stat-label">Verdorrung</span>
            <span class="stat-value ${isRotten ? 'warning' : ''}">${isWatered ? 'pausiert' : (isRotten ? 'VERDORRT' : fmtTime(rotLeft))}</span>
          </div>
          <div class="progress-bar"><div class="progress-fill rot" style="width:${rotPct}%"></div></div>
        </div>
      </div>
    </div>

    <div class="stat-row" style="margin-top: 2px; font-size: 0.85rem;">
      <span class="stat-label" style="color: var(--muted);">Mutationen</span>
      <span class="stat-value" style="font-weight:500; text-align:right; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${mutStr}</span>
    </div>

    <div class="stat-row" style="margin-top: 2px; font-size: 0.9rem; color: #f59e0b; font-weight: bold; background: rgba(245,158,11,0.06); padding: 4px 6px; border-radius: 6px;">
      <span>Marktwert:</span>
      <span>${Math.round(calculatedPrice).toLocaleString('de-DE')} 🪙</span>
    </div>

    <div class="timer-btns" style="margin-top:4px;">
      <button class="timer-btn tbtn-water btn-add-w12">💧 12h</button>
      <button class="timer-btn tbtn-rot btn-add-w24">💧 24h</button>
      <button class="timer-btn tbtn-neg btn-add-p4">🌱 -4h</button>
    </div>

    <div class="card-actions">
      <button class="action-btn btn-rename">Name</button>
      <button class="action-btn btn-reset">Neu</button>
      <button class="action-btn btn-action-delete btn-delete">&#128465; Löschen</button>
    </div>
  `;

  card.querySelector('.btn-trigger-mut').addEventListener('click', () => openMutModal(b.id));
  card.querySelector('.btn-add-w12').addEventListener('click', () => addTime(b.id, 'water', 12));
  card.querySelector('.btn-add-w24').addEventListener('click', () => addTime(b.id, 'water', 24));
  card.querySelector('.btn-add-p4').addEventListener('click', () => addTime(b.id, 'plant', -4));
  card.querySelector('.btn-rename').addEventListener('click', () => triggerRename(b.id));
  card.querySelector('.btn-reset').addEventListener('click', () => resetBeet(b.id));
  card.querySelector('.btn-delete').addEventListener('click', () => deleteBeet(b.id));

  if (isNew) grid.appendChild(card);
}

function renderAll() {
  const ids = Object.keys(beete);

  [...grid.children].forEach(c => {
    const id = c.id.replace('card-', '');
    if (!beete[id]) c.remove();
  });

  ids.sort((a, b) => (beete[a].plantedAt || 0) - (beete[b].plantedAt || 0))
     .forEach(id => renderCard(beete[id]));

  document.getElementById('emptyState').style.display = ids.length ? 'none' : 'block';
}

// Live-Tick jede Sekunde
setInterval(() => {
  Object.values(beete).forEach(b => {
    const el = document.getElementById('card-' + b.id);
    if (el) renderCard(b);
  });
}, 1000);

// --- Firestore: Live-Sync der Beete ---
onSnapshot(colRef, (snap) => {
  syncStatus.classList.remove('error');
  syncStatus.classList.add('connected');
  syncLabel.textContent = 'Verbunden';
  beete = {};
  snap.forEach(d => { beete[d.id] = { id: d.id, ...d.data() }; });
  renderAll();
}, (err) => {
  syncStatus.classList.remove('connected');
  syncStatus.classList.add('error');
  syncLabel.textContent = 'Verbindungsfehler';
  console.error(err);
});

// --- Firestore: Live-Sync des globalen Marktpreises ---
onSnapshot(settingsRef, (snap) => {
  if (snap.exists()) {
    const data = snap.data();
    if (typeof data.marketPrice === 'number') {
      globalMarketPrice = data.marketPrice;
      if (document.activeElement !== marketPriceInput) {
        marketPriceInput.value = globalMarketPrice;
      }
      renderAll();
    }
  }
});

async function addBeet() {
  const inp = document.getElementById('newName');
  const name = inp.value.trim();

  if (!name) {
    alert('Bitte gib einen Namen für das Beet ein.');
    return;
  }

  const nameExists = Object.values(beete).some(b => b.name.toLowerCase() === name.toLowerCase());
  if (nameExists) {
    alert(`Ein Beet mit dem Namen "${name}" existiert bereits!`);
    return;
  }

  const id = 'beet_' + Date.now();
  await setDoc(doc(db, 'beete', id), {
    name, plantedAt: now(), wateredAt: now(), mutations: { gold: false, shapeKey: "", weightMult: 1 }
  });
  inp.value = '';
}

async function triggerRename(id) {
  const b = beete[id];
  if (!b) return;

  const newName = prompt("Gib einen neuen Namen für das Beet ein:", b.name);
  if (newName === null) return;

  const trimmedName = newName.trim();
  if (!trimmedName) {
    alert("Der Name darf nicht leer sein.");
    return;
  }

  const nameExists = Object.values(beete).some(item => item.id !== id && item.name.toLowerCase() === trimmedName.toLowerCase());
  if (nameExists) {
    alert(`Ein Beet mit dem Namen "${trimmedName}" existiert bereits!`);
    return;
  }

  await updateDoc(doc(db, 'beete', id), { name: trimmedName });
}

async function deleteBeet(id) {
  if (!confirm('Beet löschen?')) return;
  await deleteDoc(doc(db, 'beete', id));
}

async function resetBeet(id) {
  await updateDoc(doc(db, 'beete', id), {
    plantedAt: now(),
    wateredAt: now(),
    mutations: { gold: false, shapeKey: "", weightMult: 1 }
  });
}

async function addTime(id, field, hours) {
  const b = beete[id];
  if (!b) return;
  const key = field === 'water' ? 'wateredAt' : 'plantedAt';
  const cur = b[key] || now();
  await updateDoc(doc(db, 'beete', id), { [key]: cur + hours * 3600000 });
}

function openMutModal(id) {
  activeMutId = id;
  const b = beete[id];
  document.getElementById('mutModalTitle').textContent = b.name;

  const mut = b.mutations || {};
  document.getElementById('mut-gold').checked = !!mut.gold;
  document.getElementById('mut-shape-select').value = mut.shapeKey || "";
  document.getElementById('mut-weight-mult').value = mut.weightMult || 1;

  document.getElementById('mutModal').style.display = 'flex';
}

function closeMutModal() {
  document.getElementById('mutModal').style.display = 'none';
  activeMutId = null;
}

async function saveMutation() {
  if (!activeMutId) return;

  let wMult = parseFloat(document.getElementById('mut-weight-mult').value) || 1;
  if (wMult < 1) wMult = 1;
  if (wMult > 5) wMult = 5; // Begrenzung auf das 5-Fache

  await updateDoc(doc(db, 'beete', activeMutId), {
    mutations: {
      gold: document.getElementById('mut-gold').checked,
      shapeKey: document.getElementById('mut-shape-select').value,
      weightMult: wMult
    }
  });
}

// --- Event Listener ---
document.getElementById('btnAddBeet').addEventListener('click', addBeet);
document.getElementById('newName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addBeet();
});
document.getElementById('btnCloseModal').addEventListener('click', closeMutModal);
document.getElementById('mutModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('mutModal')) closeMutModal();
});

document.getElementById('mut-gold').addEventListener('change', saveMutation);
document.getElementById('mut-shape-select').addEventListener('change', saveMutation);
document.getElementById('mut-weight-mult').addEventListener('input', saveMutation);

// Marktpreis: lokal sofort anwenden, bei Bestätigung (Enter/Blur) mit allen synchronisieren
marketPriceInput.addEventListener('input', () => {
  globalMarketPrice = parseInt(marketPriceInput.value) || 0;
  renderAll();
});
marketPriceInput.addEventListener('change', async () => {
  globalMarketPrice = parseInt(marketPriceInput.value) || 0;
  await setDoc(settingsRef, { marketPrice: globalMarketPrice }, { merge: true });
});

renderAll();
</script>
</body>
</html>
