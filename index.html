<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  onSnapshot,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "beete");

/* ===== STATE ===== */
let beete = {};
let activeMutId = null;

/* ===== REPLACE LOCALSTORAGE LOAD ===== */
onSnapshot(colRef, (snap) => {
  beete = {};
  snap.forEach(d => {
    beete[d.id] = d.data();
  });
  renderAll();
});

/* ===== REPLACE SAVE FUNCTION ===== */
function saveToStorage() {
  Object.values(beete).forEach(async (b) => {
    await setDoc(doc(db, "beete", b.id), b, { merge: true });
  });
}

/* ===== TIME ===== */
function now() { return Date.now(); }

/* ===== ALL YOUR ORIGINAL FUNCTIONS BELOW (UNCHANGED LOGIC) ===== */

function fmtTime(ms) {
  if (ms <= 0) return '0s';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

/* ===== ADD BEET (only Firebase replace) ===== */
function addBeet() {
  const inp = document.getElementById('newName');
  const name = inp.value.trim();

  if (!name) return alert('Bitte Namen eingeben');

  const id = 'beet_' + Date.now();

  beete[id] = {
    id,
    name,
    plantedAt: now(),
    wateredAt: now(),
    basePrice: 100,
    mutations: { gold: false, shapeKey: "", weightMult: 1 }
  };

  setDoc(doc(db, "beete", id), beete[id]);

  inp.value = '';
}

/* ===== DELETE ===== */
function deleteBeet(id) {
  delete beete[id];
  deleteDoc(doc(db, "beete", id));
}

/* ===== RESET ===== */
function resetBeet(id) {
  beete[id].plantedAt = now();
  beete[id].wateredAt = now();
  beete[id].mutations = { gold: false, shapeKey: "", weightMult: 1 };

  updateDoc(doc(db, "beete", id), beete[id]);
}

/* ===== RENAME ===== */
function triggerRename(id) {
  const newName = prompt("Neuer Name:", beete[id].name);
  if (!newName) return;

  beete[id].name = newName;

  updateDoc(doc(db, "beete", id), { name: newName });
}

/* ===== TIME ADJUST ===== */
function addTime(id, field, hours) {
  const key = field === 'water' ? 'wateredAt' : 'plantedAt';

  beete[id][key] = (beete[id][key] || now()) + hours * 3600000;

  updateDoc(doc(db, "beete", id), {
    [key]: beete[id][key]
  });
}

/* ===== MUTATION ===== */
function saveMutation() {
  if (!activeMutId) return;

  const data = {
    gold: document.getElementById('mut-gold').checked,
    shapeKey: document.getElementById('mut-shape-select').value,
    weightMult: parseFloat(document.getElementById('mut-weight-mult').value) || 1
  };

  beete[activeMutId].mutations = data;

  updateDoc(doc(db, "beete", activeMutId), {
    mutations: data
  });
}

/* ===== MODAL ===== */
function openMutModal(id) {
  activeMutId = id;

  const m = beete[id].mutations || {};

  document.getElementById('mutModalTitle').textContent = beete[id].name;

  document.getElementById('mut-gold').checked = !!m.gold;
  document.getElementById('mut-shape-select').value = m.shapeKey || "";
  document.getElementById('mut-weight-mult').value = m.weightMult || 1;

  document.getElementById('mutModal').style.display = 'flex';
}

function closeMutModal() {
  document.getElementById('mutModal').style.display = 'none';
  activeMutId = null;
}

/* ===== KEEP YOUR EXISTING RENDERALL() EXACTLY ===== */
/* (NICHT ANGEFASST – bleibt aus deinem Original) */

document.getElementById('btnAddBeet').onclick = addBeet;

document.getElementById('mut-gold').onchange = saveMutation;
document.getElementById('mut-shape-select').onchange = saveMutation;
document.getElementById('mut-weight-mult').oninput = saveMutation;

document.getElementById('btnCloseModal').onclick = closeMutModal;

setInterval(() => {
  Object.values(beete).forEach(b => {
    const el = document.getElementById('card-' + b.id);
    if (el) renderCard(b);
  });
}, 1000);

</script>
