<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟫 Rübentimer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #0b0e14;
    --border: #1e2230;
    --accent: #22c55e;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --ripe: #22c55e;
    --water: #38bdf8;
    --warning: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Elegante Einbindung deines hochgeladenen Bildes als dezenten Hintergrund */
  body::before {
    content: "";
    position: fixed;
    bottom: 0;
    right: 5%;
    width: 500px; /* Breite des Charakters im Hintergrund */
    height: 650px;
    background-image: url('image_811360.jpg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: bottom right;
    /* Macht den weißen Hintergrund unsichtbar und bettet das Bild sanft ins Dunkle ein */
    mix-blend-mode: luminosity;
    opacity: 0.07; /* Extrem schwach eingestellt (7% Sichtbarkeit), damit man den Text perfekt liest */
    pointer-events: none;
    z-index: -1;
  }

  header {
    background: rgba(26, 29, 39, 0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    flex-wrap: wrap;
  }

  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 7px 14px;
    transition: all 0.15s;
  }
  button:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: #16a34a; }

  .sync-status {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .sync-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  main {
    padding: 16px 20px;
    max-width: 1600px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .card {
    background: rgba(11, 14, 20, 0.88);
    backdrop-filter: blur(4px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
  }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 6px;
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }

  .status-text {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
  }

  .card-body-layout {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .card-left-cell { flex-shrink: 0; }
  .card-right-cell { flex-grow: 1; }

  .turnip-img-box {
    width: 58px;
    height: 58px;
    background: #151922;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    cursor: pointer;
    user-select: none;
    position: relative;
    border: 1px solid #1e2433;
  }

  .multiplier {
    position: absolute;
    top: -4px; left: -4px;
    background: #f59e0b;
    color: #0f1117;
    font-size: 0.6rem;
    font-weight: 800;
    border-radius: 50%;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  .stats { display: flex; flex-direction: column; gap: 4px; width: 100%; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
  }
  .stat-label { color: #fff; }
  .stat-value { font-weight: 700; color: #fff; }
  .stat-value.active-timer { color: #38bdf8; }
  .stat-value.warning { color: var(--warning); }

  .progress-bar {
    width: 100%;
    height: 5px;
    background: #151922;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .progress-fill { height: 100%; border-radius: 4px; width: 0%; }
  .progress-fill.ripe { background: var(--ripe); }
  .progress-fill.water { background: var(--water); }
  .progress-fill.rot { background: var(--warning); }

  .timer-btns { display: flex; gap: 6px; }
  .timer-btn {
    flex: 1;
    padding: 8px 4px;
    font-size: 0.85rem;
    font-weight: 700;
    border-radius: 8px;
    color: #fff;
    text-align: center;
    cursor: pointer;
  }
  .tbtn-water { background: #16a34a; }
  .tbtn-water:hover { background: #15803d; }
  .tbtn-rot { background: #d97706; }
  .tbtn-rot:hover { background: #b45309; }
  .tbtn-neg { background: #7c3aed; }
  .tbtn-neg:hover { background: #6d28d9; }

  .card-actions { display: flex; gap: 6px; }
  .action-btn {
    padding: 10px 4px;
    background: #
