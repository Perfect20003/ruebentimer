<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟫 Rübentimer Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root { --bg: #0f1117; --surface: #1a1d27; --card: #0b0e14; --border: #1e2230; --accent: #22c55e; --text: #e2e8f0; --muted: #94a3b8; --warning: #ef4444; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 40px; }
  header { background: rgba(26, 29, 39, 0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; padding: 20px; max-width: 1600px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  input, button, select { background: #151922; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 8px; }
  .btn-primary { background: var(--accent); color: #0f1117; font-weight: 700; cursor: pointer; }
  .progress-bar { width: 100%; height: 6px; background: #151922; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); width: 0%; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: #1a1d27; padding: 25px; border-radius: 16px; width: 350px; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div style="font-weight:800; font-size:1.2rem">🟫 Rübentimer</div>
  <input type="text" id="newName" placeholder="Beetname..." />
  <button class="btn-primary" id="btnAddBeet">+ Hinzufügen</button>
  <div style="border-left:1px solid var(--border); padding-left:15px; margin-left:auto;">
    <small style="display:block; color:var(--muted); font-size:0.7rem;">Globaler Preis</small>
    <input type="number" id="globalBasePrice" value="100" style="width:70px" />
  </div>
</header>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="mutModal" style="display:none">
  <div class="modal">
    <h3>🧬 <span id="mutModalTitle"></span></h3>
    <label>💰 Basispreis:<br><input type="number" id="mut-base-price" style="width:100%"></label><br><br>
    <label><input type="checkbox" id="mut-gold"> Gold-Bonus (10x)</label><br><br>
    <label>Gewicht-Multiplikator:<br><input type="number" id="mut-weight-mult" min="1" max="5" step="0.1" style="width:100%"></label>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button onclick="closeModal()">Abbrechen</button>
        <button class="btn-primary" onclick="saveModal()">Speichern</button>
    </div>
  </div>
</div>

<script>
let beete = JSON.parse(localStorage.getItem('rueben_full_data')) || {};

function save() { localStorage.setItem('rueben_full_data', JSON.stringify(beete)); render(); }

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  Object.values(beete).forEach(b => {
    const finalPrice = Math.round(b.basePrice * (b.gold ? 10 : 1) * (b.weight || 1));
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="display:flex; justify-content:between;"><strong>${b.name}</strong></div>
      <div style="font-size:1.1rem; color:var(--accent); font-weight:700;">Marktwert: ${finalPrice.toLocaleString()} 🪙</div>
      <div class="progress-bar"><div class="progress-fill" style="width:60%"></div></div>
      <div style="display:flex; gap:5px;">
        <button onclick="openModal('${b.id}')">⚙️ Optionen</button>
        <button onclick="deleteBeet('${b.id}')" style="background:var(--warning)">Löschen</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.getElementById('btnAddBeet').onclick = () => {
  const name = document.getElementById('newName').value || "Neues Beet";
  const id = 'b_' + Date.now();
  beete[id] = { id, name, basePrice: parseInt(document.getElementById('globalBasePrice').value), gold: false, weight: 1 };
  save();
};

document.getElementById('globalBasePrice').onchange = (e) => {
  const val = parseInt(e.target.value);
  Object.values(beete).forEach(b => b.basePrice = val);
  save();
};

function openModal(id) {
  window.activeId = id;
  const b = beete[id];
  document.getElementById('mutModalTitle').textContent = b.name;
  document.getElementById('mut-base-price').value = b.basePrice;
  document.getElementById('mut-gold').checked = b.gold;
  document.getElementById('mut-weight-mult').value = b.weight;
  document.getElementById('mutModal').style.display = 'flex';
}

function saveModal() {
  const b = beete[window.activeId];
  b.basePrice = parseInt(document.getElementById('mut-base-price').value);
  b.gold = document.getElementById('mut-gold').checked;
  b.weight = parseFloat(document.getElementById('mut-weight-mult').value);
  save(); closeModal();
}

function closeModal() { document.getElementById('mutModal').style.display = 'none'; }
function deleteBeet(id) { delete beete[id]; save(); }

render();
</script>
</body>
</html>
