<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟫 Rübentimer Firebase</title>

<style>
/* ====== DEIN ORIGINAL CSS 1:1 ====== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg:#0f1117;
  --surface:#1a1d27;
  --card:#0b0e14;
  --border:#1e2230;
  --accent:#22c55e;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --ripe:#22c55e;
  --water:#38bdf8;
  --warning:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

header{
  background:var(--surface);
  padding:14px;
  display:flex;
  gap:10px;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

input,button{
  padding:7px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--text);
}

button{cursor:pointer}

.btn-primary{background:var(--accent);color:#000;border:none}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
  padding:15px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <input id="newName" placeholder="Beetname">
  <input id="marketPrice" type="number" value="100000">
  <button class="btn-primary" id="addBtn">+ Beet</button>
</header>

<div class="grid" id="grid"></div>

<script type="module">

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  setDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db,"beete");

/* ================= STATE ================= */

let beete = {};
let activeMut = null;

/* ================= DEINE ORIGINAL LOGIK ================= */

const GROW_INTERVAL  = 48*60*60*1000;
const WATER_INTERVAL = 12*60*60*1000;
const ROT_INTERVAL   = 4*24*60*60*1000;

const SHAPE_BONI = {
  stachelig:50000,
  quadratisch:100000,
  explosiv:500000,
  lebendig:1000000
};

function now(){return Date.now()}

/* ===== PRICE (1:1 aus deiner Logik) ===== */
function calcPrice(b){
  let base = parseInt(document.getElementById("marketPrice").value)||100000;
  let m = b.mutations||{};

  let price = base;

  if(m.shapeKey) price += SHAPE_BONI[m.shapeKey]||0;
  if(m.weightMult) price *= m.weightMult;
  if(m.gold) price *= 10;

  return Math.round(price);
}

/* ================= FIREBASE SYNC ================= */

onSnapshot(col,(snap)=>{
  beete = {};
  snap.forEach(d=>{
    beete[d.id]=d.data();
  });
  renderAll();
});

/* ================= RENDER (DEIN SYSTEM 1:1) ================= */

function renderAll(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  Object.entries(beete).forEach(([id,b])=>{

    const price = calcPrice(b);
    const m = b.mutations||{};

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <b>${b.name}</b><br><br>

      🌿 ${m.shapeKey||"Normal"} <br>
      ⚖️ ${m.weightMult||1}x <br>
      ⭐ ${m.gold?"Gold":"kein Gold"} <br><br>

      💰 ${price.toLocaleString()} 🪙 <br><br>

      <button onclick="openMut('${id}')">Mutationen</button>
      <button onclick="del('${id}')">Löschen</button>
    `;

    grid.appendChild(card);
  });
}

/* ================= ACTIONS (1:1 LOGIK) ================= */

window.addBeet = async ()=>{
  const name = document.getElementById("newName").value||"Beet";
  const id = "b"+Date.now();

  await setDoc(doc(db,"beete",id),{
    name,
    plantedAt:now(),
    wateredAt:now(),
    mutations:{gold:false,shapeKey:"",weightMult:1}
  });
};

window.del = async (id)=>{
  await deleteDoc(doc(db,"beete",id));
};

/* ===== MUTATIONS ===== */

window.openMut = (id)=>{
  activeMut=id;
  const b=beete[id];

  const m=b.mutations||{};

  const gold = confirm("Gold aktiv?");
  const shape = prompt("shapeKey (stachelig/quadratisch/explosiv/lebendig):",m.shapeKey||"")||"";
  const weight = parseFloat(prompt("weight (1–5):",m.weightMult||1))||1;

  updateDoc(doc(db,"beete",id),{
    mutations:{
      gold,
      shapeKey:shape,
      weightMult:Math.min(5,Math.max(1,weight))
    }
  });
};

</script>

</body>
</html>
